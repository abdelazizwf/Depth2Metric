<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depth2Metric</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/"
        }
    }
    </script>
    <link rel="icon" type="image/png" href="{{ url_for('static', path='favicon.png') }}" />
</head>
<body>

<header class="topbar">
    <div class="topbar-section">
        <div id="imageInputForm" class="control-group">
            <input type="file" id="imageInput" accept="image/*" class="file-input">
            <button id="analyzeBtn" class="btn primary">Analyze</button>
            <span id="status"></span>
        </div>
        <button id="openSamplesBtn" class="btn">Samples</button>
        <button id="downloadBtn" class="btn" disabled>Download PLY</button>
    </div>

    <div class="topbar-section info-section">
        <div class="info">
            <span class="instruction text-medium">Hold left-click (or long-press) two points to measure</span>
            <span id="distanceResult" class="text-large highlight"></span>
        </div>
    </div>

    <div class="topbar-section">
        <div id="correctMeasureForm" class="control-group">
            <span class="text-small label-text">Calibrate:</span>
            <input type="number" id="correctMeasureNum" placeholder="Cm" disabled>
            <button id="correctMeasureBtn" class="btn" disabled>Update</button>
        </div>
    </div>

    <div id="samplesModal" class="modal">
        <div class="modal-content">
            <span id="closeSamples" class="close">&times;</span>
            <h3>Select a Sample</h3>
            <div class="samples-grid">
                {% for img in samples %}
                <img src="/static/samples/{{ img }}" class="sample-img" data-filename="{{ img }}" alt="{{ img }}">
                {% endfor %}
            </div>
        </div>
    </div>
</header>

<main id="viewer"></main>

<footer id="footer">
    <small class="text-medium">
        &copy; 2026 Abdelaziz Farahat &middot; Depth2Metric &middot;
        <a href="https://github.com/abdelazizwf/Depth2Metric" target="_blank" rel="noopener noreferrer">GitHub</a>
    </small>
</footer>

<div id="scaleModal" class="modal">
    <div class="modal-content">
        <span id="closeScaleModal" class="close">&times;</span>
        <h3>Scene Scale Estimated</h3>
        <p id="scaleMessage"></p>
    </div>
</div>

<div id="errorModal" class="modal">
    <div class="modal-content border-error">
        <span id="closeErrorModal" class="close">&times;</span>
        <h3 class="text-error">Error</h3>
        <p id="errorMessage"></p>
        <button id="errorOkBtn" class="btn">OK</button>
    </div>
</div>

<script type="module" src="{{ url_for('static', path='script.js') }}"></script>

</body>
</html>
